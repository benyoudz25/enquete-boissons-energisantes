<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enquête Universitaire | Boissons Énergisantes</title>
    
    <!-- Polices Google (Poppins pour le FR, Cairo pour l'AR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS Personnalisé (Glassmorphism & Animations) -->
    <style>
        :root {
            --font-fr: 'Poppins', sans-serif;
            --font-ar: 'Cairo', sans-serif;
            --primary: #34d399; /* Mint Green */
            --primary-glow: rgba(52, 211, 153, 0.4);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            background-size: cover;
            background-attachment: fixed;
            color: #f8fafc;
            font-family: var(--font-fr);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.lang-ar {
            font-family: var(--font-ar);
            direction: rtl;
        }

        /* --- Glassmorphism UI --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .glass-btn.selected {
            background: rgba(52, 211, 153, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.02);
        }

        /* --- Quiz States --- */
        .quiz-correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4) !important;
        }
        .quiz-incorrect {
            background: rgba(244, 63, 94, 0.2) !important;
            border-color: #f43f5e !important;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.4) !important;
        }

        /* --- Animations --- */
        .fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .fade-out-down {
            animation: fadeOutDown 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeOutDown {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-20px) scale(0.98); }
        }

        /* Inputs textuels stylisés */
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        .glass-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Masquer la scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden lang-fr">

    <!-- HEADER : Logos & Langue -->
    <header class="w-full p-4 md:p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-emerald-400 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/30">
                <span class="text-xl font-bold">⚡</span>
            </div>
            <div class="hidden md:block">
                <h1 class="text-sm font-bold tracking-wider text-emerald-300" id="header-title">SANTÉ PUBLIQUE</h1>
                <p class="text-xs text-slate-400">Université Algérienne</p>
            </div>
        </div>
        
        <!-- Toggle Langue -->
        <div class="flex bg-black/30 rounded-full p-1 border border-white/10 backdrop-blur-md">
            <button onclick="setLang('fr')" id="btn-fr" class="px-4 py-1.5 rounded-full text-sm font-semibold bg-white/20 text-white shadow transition-all">FR</button>
            <button onclick="setLang('ar')" id="btn-ar" class="px-4 py-1.5 rounded-full text-sm font-semibold text-slate-400 hover:text-white transition-all">عربي</button>
        </div>
    </header>

    <!-- BARRE DE PROGRESSION -->
    <div class="w-full h-1 bg-white/5 fixed top-0 left-0 z-50">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-teal-400 to-emerald-400 w-0 transition-all duration-500 ease-out shadow-[0_0_10px_rgba(52,211,153,0.8)]"></div>
    </div>

    <!-- ZONE PRINCIPALE (Wizard) -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 w-full relative">
        <div id="card-container" class="glass-card w-full max-w-3xl rounded-3xl p-6 md:p-10 relative z-10 mx-auto">
            <!-- Injecté par JS -->
        </div>
    </main>

    <!-- FOOTER : Navigation -->
    <footer class="w-full max-w-3xl mx-auto p-4 flex justify-between items-center z-50 mb-4 h-16">
        <button id="prev-btn" onclick="prevStep()" class="opacity-0 pointer-events-none px-6 py-2 rounded-full text-slate-300 font-medium hover:text-white transition-all flex items-center gap-2">
            <span id="prev-text">← Précédent</span>
        </button>
        
        <button id="next-btn" onclick="nextStep()" class="hidden px-8 py-3 rounded-full font-bold bg-emerald-500 text-slate-900 shadow-[0_0_20px_rgba(52,211,153,0.4)] hover:bg-emerald-400 transition-all flex items-center gap-2">
            <span id="next-text">Suivant →</span>
        </button>
    </footer>

    <!-- LOGIQUE JAVASCRIPT -->
    <script>
        // --- 1. BASE DE DONNÉES COMPLÈTE (Modèle 5) ---
        const surveyData =[
            // --- INTRO & CONSENTEMENT ---
            {
                type: 'intro',
                id: 'welcome',
                title: { fr: "L'impact des Boissons Énergisantes", ar: "تأثير مشروبات الطاقة" },
                desc: { 
                    fr: "Ce questionnaire universitaire vise à comprendre vos habitudes, croyances et connaissances sur les boissons énergisantes.<br><br>⏱️ <strong>Temps estimé : 5 minutes.</strong><br>🔒 Vos réponses sont 100% anonymes et confidentielles.", 
                    ar: "يهدف هذا الاستبيان الجامعي إلى فهم عاداتك ومعتقداتك ومعارفك حول مشروبات الطاقة.<br><br>⏱️ <strong>الوقت المقدر: 5 دقائق.</strong><br>🔒 إجاباتك مجهولة الهوية وسرية 100%." 
                },
                btn: { fr: "Je consens et je commence 🚀", ar: "أوافق وأبدأ 🚀" }
            },

            // --- SECTION 2 : PROFIL ---
            {
                type: 'radio', id: 'sexe',
                q: { fr: "Quel est votre sexe ?", ar: "ما هو جنسك؟" },
                options:[
                    { val: 1, fr: "Homme", ar: "ذكر", icon: "👨" },
                    { val: 0, fr: "Femme", ar: "أنثى", icon: "👩" }
                ]
            },
            {
                type: 'number', id: 'age',
                q: { fr: "Quel est votre âge ?", ar: "ما هو عمرك؟" },
                placeholder: { fr: "Ex: 22", ar: "مثال: 22" },
                suffix: { fr: "ans", ar: "سنة" }
            },
            {
                type: 'radio', id: 'filiere',
                q: { fr: "Dans quelle filière étudiez-vous ?", ar: "ما هو تخصصك الدراسي؟" },
                options:[
                    { val: 1, fr: "Sciences de la santé", ar: "علوم الصحة", icon: "⚕️" },
                    { val: 2, fr: "Ingénierie & Techniques", ar: "الهندسة والتقنيات", icon: "💻" },
                    { val: 3, fr: "Sciences Humaines / Sociales", ar: "العلوم الإنسانية والاجتماعية", icon: "📚" },
                    { val: 4, fr: "Autres", ar: "تخصصات أخرى", icon: "🎓" }
                ]
            },
            {
                type: 'radio', id: 'residence',
                q: { fr: "Où résidez-vous actuellement ?", ar: "أين تقيم حالياً؟" },
                options:[
                    { val: 1, fr: "En famille", ar: "مع العائلة", icon: "🏠" },
                    { val: 2, fr: "Cité Universitaire", ar: "إقامة جامعية", icon: "🏢" },
                    { val: 3, fr: "Colocation / Seul", ar: "سكن مشترك / بمفردي", icon: "🔑" }
                ]
            },
            {
                type: 'likert', id: 'stress',
                q: { fr: "Évaluez votre niveau de stress global", ar: "قيّم مستوى التوتر العام لديك" },
                labels: { fr: ["Faible", "Élevé"], ar:["ضعيف", "مرتفع"] }
            },
            {
                type: 'likert', id: 'sommeil',
                q: { fr: "Évaluez la qualité de votre sommeil", ar: "قيّم جودة نومك" },
                labels: { fr: ["Mauvaise", "Bonne"], ar:["سيئة", "جيدة"] }
            },
            {
                type: 'number', id: 'poids',
                q: { fr: "Quel est votre poids approximatif ?", ar: "ما هو وزنك التقريبي؟" },
                placeholder: { fr: "Ex: 65", ar: "مثال: 65" },
                suffix: { fr: "kg", ar: "كغ" }
            },
            {
                type: 'number', id: 'taille',
                q: { fr: "Quelle est votre taille ?", ar: "ما هو طولك؟" },
                placeholder: { fr: "Ex: 170", ar: "مثال: 170" },
                suffix: { fr: "cm", ar: "سم" }
            },

            // --- SECTION 3 : CONNAISSANCES (QUIZ - H1) ---
            {
                type: 'quiz', id: 'q_z1',
                q: { fr: "Les boissons énergisantes contiennent généralement de la taurine.", ar: "تحتوي مشروبات الطاقة عادة على التورين." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 1, expl: { fr: "Vrai : C'est un acide aminé ajouté industriellement.", ar: "صحيح: حمض أميني يُضاف صناعياً." }
            },
            {
                type: 'quiz', id: 'q_z2',
                q: { fr: "Une canette classique (250ml) contient l'équivalent de 2 morceaux de sucre.", ar: "علبة عادية (250 مل) تحتوي على ما يعادل قطعتي سكر." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 0, expl: { fr: "Faux : Elle contient environ 27g, soit 6 à 7 morceaux de sucre !", ar: "خطأ: تحتوي على حوالي 27غ، أي 6 إلى 7 قطع." }
            },
            {
                type: 'quiz', id: 'q_z3',
                q: { fr: "Les boissons énergisantes et les boissons pour sportifs ont le même rôle.", ar: "مشروبات الطاقة ومشروبات الرياضيين لها نفس الدور." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 0, expl: { fr: "Faux : Les boissons énergisantes déshydratent (caféine), les boissons sportives réhydratent.", ar: "خطأ: مشروبات الطاقة تسبب الجفاف، عكس مشروبات الرياضيين." }
            },
            {
                type: 'quiz', id: 'q_z4',
                q: { fr: "La limite de sécurité pour la caféine chez l'adulte est de 400 mg/jour.", ar: "الحد الآمن للكافيين للبالغين هو 400 ملغ/يوم." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 1, expl: { fr: "Vrai : C'est la recommandation officielle de l'EFSA.", ar: "صحيح: إنها توصية رسمية من EFSA." }
            },
            {
                type: 'quiz', id: 'q_z5',
                q: { fr: "Le guarana est une plante utilisée car elle est riche en caféine.", ar: "يُستخدم الغوارانا لأنه غني بالكافيين." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 1, expl: { fr: "Vrai : Il contient 2 à 3 fois plus de caféine que le café.", ar: "صحيح: يحتوي على كافيين أكثر من القهوة بمرتين إلى ثلاث." }
            },
            {
                type: 'quiz', id: 'q_z6',
                q: { fr: "La consommation régulière peut favoriser la résistance à l'insuline.", ar: "الاستهلاك المنتظم يمكن أن يعزز مقاومة الأنسولين." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 1, expl: { fr: "Vrai : C'est dû à l'excès de sucres rapides.", ar: "صحيح: بسبب الإفراط في السكريات السريعة." }
            },
            {
                type: 'quiz', id: 'q_z7',
                q: { fr: "Mélanger une boisson énergisante avec des médicaments est inoffensif.", ar: "خلط مشروب طاقة مع الأدوية غير ضار." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 0, expl: { fr: "Faux : La caféine interagit et peut augmenter la toxicité de certains médicaments.", ar: "خطأ: الكافيين يتفاعل وقد يزيد من السمية." }
            },
            {
                type: 'quiz', id: 'q_z8',
                q: { fr: "La surconsommation ne présente aucun risque cardiaque pour un jeune en bonne santé.", ar: "الإفراط لا يشكل خطراً قلبياً على شاب سليم." },
                options:[ { val: 1, fr: "Vrai", ar: "صحيح" }, { val: 0, fr: "Faux", ar: "خطأ" }, { val: -1, fr: "NSP", ar: "لا أعرف" } ],
                correctAnswer: 0, expl: { fr: "Faux : Le risque de tachycardie et d'arythmie est cliniquement prouvé.", ar: "خطأ: ثبت سريرياً خطر تسارع نبضات القلب." }
            },

            // --- SECTION 4 : PERCEPTIONS (TCP - H2/H3) ---
            { type: 'likert', id: 'tcp_1', q: { fr: "Boire une boisson énergisante m'aide à être plus performant pour réviser.", ar: "شربها يساعدني على أداء أفضل في المراجعة." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_2', q: { fr: "Elles sont indispensables pour me maintenir éveillé(e) lors d'une nuit blanche.", ar: "هي ضرورية لإبقائي مستيقظاً في ليالي السهر." }, labels: { fr: ["Pas d'accord", "D'accord"], ar: ["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_3', q: { fr: "L'effet immédiat est plus important pour moi que les risques sur ma santé.", ar: "التأثير الفوري أهم من مخاطرها الصحية." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_4', q: { fr: "Voir mes amis en boire m'incite à en consommer aussi.", ar: "رؤية أصدقائي يشربونها تشجعني على ذلك." }, labels: { fr:["Pas d'accord", "D'accord"], ar: ["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_5', q: { fr: "La consommation est devenue totalement banale sur le campus.", ar: "أصبح استهلاكها أمراً عادياً تماماً في الحرم الجامعي." }, labels: { fr: ["Pas d'accord", "D'accord"], ar: ["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_6', q: { fr: "Leur sponsoring sportif me donne l'impression qu'elles sont saines.", ar: "رعايتها للرياضة تعطيني انطباعاً بأنها صحية." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_7', q: { fr: "Les publicités minimisent grandement les dangers réels.", ar: "الإعلانات تقلل بشكل كبير من أخطارها الحقيقية." }, labels: { fr:["Pas d'accord", "D'accord"], ar: ["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_8', q: { fr: "Il m'est facile de m'en passer totalement si je le décide.", ar: "من السهل التخلي عنها تماماً إذا قررت ذلك." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_9', q: { fr: "En période d'examens, il m'est très difficile de résister à l'envie d'en boire.", ar: "في فترة الامتحانات، يصعب جداً مقاومة الرغبة فيها." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_10', q: { fr: "Je crains de ressentir des palpitations ou des insomnies après en avoir bu.", ar: "أخشى من خفقان القلب أو الأرق بعد شربها." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_11', q: { fr: "Je suis conscient(e) qu'elles peuvent endommager le système cardiovasculaire.", ar: "أنا مدرك أنها قد تضر بالقلب على المدى الطويل." }, labels: { fr:["Pas d'accord", "D'accord"], ar: ["لا أوافق", "أوافق"] } },
            { type: 'likert', id: 'tcp_12', q: { fr: "Je pense qu'il est possible de développer une réelle dépendance.", ar: "أعتقد أنه من الممكن تطوير إدمان حقيقي." }, labels: { fr: ["Pas d'accord", "D'accord"], ar:["لا أوافق", "أوافق"] } },

            // --- SECTION 5 : HABITUDES & FILTRE ---
            {
                type: 'filter', id: 'conso_ever',
                q: { fr: "Avez-vous déjà consommé une boisson énergisante dans votre vie ?", ar: "هل سبق لك استهلاك مشروب طاقة؟" },
                options:[
                    { val: 1, fr: "Oui", ar: "نعم", icon: "⚡" },
                    { val: 0, fr: "Non, jamais", ar: "لا، أبداً", icon: "🛑" }
                ]
            },
            // Conditionnelles (s'affichent uniquement si conso_ever == 1)
            {
                type: 'radio', id: 'freq', condition: 'conso_ever',
                q: { fr: "À quelle fréquence en consommez-vous actuellement ?", ar: "ما هو تكرار استهلاكك؟" },
                options:[
                    { val: 4, fr: "Tous les jours", ar: "يومياً" },
                    { val: 3, fr: "Hebdomadaire", ar: "أسبوعياً" },
                    { val: 2, fr: "Mensuelle", ar: "شهرياً" },
                    { val: 1, fr: "Rarement", ar: "نادراً" }
                ]
            },
            {
                type: 'radio', id: 'qte', condition: 'conso_ever',
                q: { fr: "Combien de canettes buvez-vous lors d'une même occasion (Binge Drinking) ?", ar: "الكمية في المناسبة الواحدة؟" },
                options:[
                    { val: 1, fr: "1 seule", ar: "1 فقط" },
                    { val: 2, fr: "2 canettes", ar: "2 علبتان" },
                    { val: 3, fr: "3 ou plus", ar: "3 أو أكثر" }
                ]
            },
            {
                type: 'checkbox', id: 'mix', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà mélangé ces boissons avec : (Plusieurs choix possibles)", ar: "الخلط مع مواد أخرى:" },
                options:[
                    { val: 'tabac', fr: "🚬 Tabac", ar: "🚬 التبغ" },
                    { val: 'meds', fr: "💊 Médicaments", ar: "💊 الأدوية" },
                    { val: 'alcool', fr: "🍷 Alcool", ar: "🍷 الكحول" },
                    { val: 'aucun', fr: "❌ Aucun mélange", ar: "❌ لا أخلطها" }
                ]
            },

            // --- SECTION 6 : SYMPTÔMES (Conditionnelles) ---
            {
                type: 'radio', id: 'symp_1', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà ressenti des Tachycardies / Palpitations ?", ar: "هل شعرت بخفقان / تسارع نبضات القلب؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },
            {
                type: 'radio', id: 'symp_2', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà ressenti de l'Insomnie ?", ar: "هل عانيت من الأرق / صعوبة في النوم؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },
            {
                type: 'radio', id: 'symp_3', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà eu des Tremblements ?", ar: "هل عانيت من رعشة في الأطراف؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },
            {
                type: 'radio', id: 'symp_4', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà eu des Maux de tête ?", ar: "هل عانيت من صداع؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },
            {
                type: 'radio', id: 'symp_5', condition: 'conso_ever',
                q: { fr: "Avez-vous déjà eu des Troubles digestifs ?", ar: "هل عانيت من اضطرابات هضمية؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },
            {
                type: 'radio', id: 'symp_6', condition: 'conso_ever',
                q: { fr: "Avez-vous ressenti de l'Anxiété ou une Nervosité inexpliquée ?", ar: "هل شعرت بقلق أو توتر غير مبرر؟" },
                options:[ { val: 2, fr: "Souvent", ar: "غالباً" }, { val: 1, fr: "Parfois", ar: "أحياناً" }, { val: 0, fr: "Jamais", ar: "أبداً" } ]
            },

            // --- FIN ---
            {
                type: 'end', id: 'end',
                title: { fr: "Merci beaucoup ! 🎉", ar: "شكراً جزيلاً! 🎉" },
                desc: { 
                    fr: "Vos réponses ont été enregistrées avec succès. Elles sont précieuses pour faire avancer la recherche scientifique en santé publique.", 
                    ar: "تم تسجيل إجاباتك بنجاح. إنها ثمينة جداً لدفع البحث العلمي في الصحة العامة." 
                },
                btn: { fr: "📥 Télécharger mes données (JSON)", ar: "📥 تحميل البيانات (JSON)" }
            }
        ];

        // --- 2. GESTION DE L'ÉTAT ---
        let currentStep = 0;
        let lang = 'fr';
        let answers = {};
        
        // --- 3. MOTEUR DE RENDU UI ---
        const container = document.getElementById('card-container');
        
        function setLang(l) {
            lang = l;
            document.body.className = `flex flex-col h-screen overflow-hidden lang-${l}`;
            
            // UI Toggle
            document.getElementById('btn-fr').className = l === 'fr' ? 'px-4 py-1.5 rounded-full text-sm font-semibold bg-white/20 text-white shadow transition-all' : 'px-4 py-1.5 rounded-full text-sm font-semibold text-slate-400 hover:text-white transition-all';
            document.getElementById('btn-ar').className = l === 'ar' ? 'px-4 py-1.5 rounded-full text-sm font-semibold bg-white/20 text-white shadow transition-all' : 'px-4 py-1.5 rounded-full text-sm font-semibold text-slate-400 hover:text-white transition-all';
            
            document.getElementById('header-title').innerText = l === 'fr' ? "SANTÉ PUBLIQUE" : "الصحة العامة";
            document.getElementById('prev-text').innerText = l === 'fr' ? "← Précédent" : "السابق →";
            document.getElementById('next-text').innerText = l === 'fr' ? "Suivant →" : "← التالي";
            
            renderStep(); // Re-render current question
        }

        function renderStep() {
            // Animation fade out
            container.classList.remove('fade-in-up');
            container.classList.add('fade-out-down');
            
            setTimeout(() => {
                buildHTML(); // Construire le HTML
                
                // Animation fade in
                container.classList.remove('fade-out-down');
                container.classList.add('fade-in-up');
                
                updateNav();
            }, 300);
        }

        function buildHTML() {
            const step = surveyData[currentStep];
            let html = '';

            // Type 1: INTRO
            if (step.type === 'intro') {
                html = `
                    <div class="text-center space-y-6">
                        <span class="px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-xs font-bold tracking-widest uppercase border border-emerald-500/30">
                            ${lang === 'fr' ? 'Recherche Épidémiologique' : 'بحث وبائي'}
                        </span>
                        <h2 class="text-3xl md:text-5xl font-extrabold leading-tight tracking-tight">${step.title[lang]}</h2>
                        <p class="text-slate-300 text-sm md:text-base max-w-lg mx-auto leading-relaxed">${step.desc[lang]}</p>
                        <button onclick="nextStep()" class="mt-8 px-8 py-4 bg-emerald-500 text-slate-900 font-bold rounded-2xl shadow-[0_0_30px_rgba(52,211,153,0.4)] hover:scale-105 transition-transform text-lg">
                            ${step.btn[lang]}
                        </button>
                    </div>
                `;
            }
            
            // Type 2: RADIO (Choix unique) ou FILTER
            else if (step.type === 'radio' || step.type === 'filter') {
                html = `
                    <h3 class="text-2xl md:text-3xl font-bold mb-8 text-center leading-snug">${step.q[lang]}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${step.options.map(opt => {
                            const isSelected = answers[step.id] === opt.val ? 'selected' : '';
                            const icon = opt.icon ? `<span class="text-2xl">${opt.icon}</span>` : '';
                            return `
                                <button onclick="saveRadio('${step.id}', ${typeof opt.val === 'string' ? `'${opt.val}'` : opt.val}, this)" class="glass-btn ${isSelected} w-full p-5 rounded-2xl flex items-center gap-4 text-lg font-medium group">
                                    ${icon}
                                    <span class="text-left">${opt.fr ? opt[lang] : opt.val}</span>
                                    <div class="${lang === 'fr' ? 'ml-auto' : 'mr-auto'} w-5 h-5 rounded-full border-2 border-white/30 group-[.selected]:border-emerald-400 group-[.selected]:bg-emerald-400 flex items-center justify-center">
                                        <div class="w-2 h-2 rounded-full bg-slate-900 opacity-0 group-[.selected]:opacity-100"></div>
                                    </div>
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Type 3: NUMBER (Input)
            else if (step.type === 'number') {
                html = `
                    <h3 class="text-2xl md:text-3xl font-bold mb-8 text-center leading-snug">${step.q[lang]}</h3>
                    <div class="flex items-center justify-center gap-4">
                        <input type="number" id="input-${step.id}" value="${answers[step.id] || ''}" placeholder="${step.placeholder[lang]}" 
                               class="glass-input text-3xl font-bold text-center w-32 h-20 rounded-2xl" 
                               oninput="saveInput('${step.id}', this.value)"
                               onkeydown="if(event.key === 'Enter' && this.value) nextStep()">
                        <span class="text-xl text-slate-400 font-medium">${step.suffix[lang]}</span>
                    </div>
                    <p class="text-center text-slate-500 mt-6 text-sm">${lang === 'fr' ? 'Appuyez sur Entrée pour valider' : 'اضغط على Enter للتأكيد'}</p>
                `;
                setTimeout(() => document.getElementById(`input-${step.id}`).focus(), 400);
            }

            // Type 4: LIKERT (1 to 5)
            else if (step.type === 'likert') {
                html = `
                    <h3 class="text-2xl md:text-3xl font-bold mb-10 text-center leading-snug">${step.q[lang]}</h3>
                    <div class="flex justify-between items-center max-w-md mx-auto mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        <span>${step.labels[lang][0]}</span>
                        <span>${step.labels[lang][1]}</span>
                    </div>
                    <div class="flex justify-between items-center max-w-md mx-auto gap-2">
                        ${[1, 2, 3, 4, 5].map(val => {
                            const isSelected = answers[step.id] === val ? 'selected' : '';
                            return `
                                <button onclick="saveRadio('${step.id}', ${val}, this)" class="glass-btn ${isSelected} w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center text-xl font-bold transition-all">
                                    ${val}
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Type 5: CHECKBOX (Choix multiple)
            else if (step.type === 'checkbox') {
                html = `
                    <h3 class="text-2xl md:text-3xl font-bold mb-8 text-center leading-snug">${step.q[lang]}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${step.options.map(opt => {
                            const arr = answers[step.id] ||[];
                            const isSelected = arr.includes(opt.val) ? 'selected' : '';
                            return `
                                <button onclick="toggleCheckbox('${step.id}', '${opt.val}', this)" class="glass-btn ${isSelected} w-full p-4 rounded-xl flex items-center gap-4 text-lg font-medium group">
                                    <div class="w-6 h-6 rounded border-2 border-white/30 group-[.selected]:border-emerald-400 group-[.selected]:bg-emerald-400 flex items-center justify-center transition-all flex-shrink-0">
                                        <span class="text-slate-900 text-sm font-bold opacity-0 group-[.selected]:opacity-100">✓</span>
                                    </div>
                                    <span class="text-left">${opt[lang]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // Type 6: QUIZ (Vrai/Faux avec feedback)
            else if (step.type === 'quiz') {
                const hasAnswered = answers[step.id] !== undefined;
                
                html = `
                    <div class="text-center mb-6 text-emerald-400 font-bold tracking-widest text-xs uppercase">${lang === 'fr' ? 'Test de connaissances' : 'اختبار المعارف'}</div>
                    <h3 class="text-2xl md:text-3xl font-bold mb-8 text-center leading-relaxed">« ${step.q[lang]} »</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="quiz-options">
                        ${step.options.map(opt => {
                            let classes = 'glass-btn';
                            if (hasAnswered) {
                                classes += ' pointer-events-none opacity-50';
                                if (answers[step.id] === opt.val && opt.val === step.correctAnswer) classes += ' quiz-correct !opacity-100 scale-105';
                                else if (answers[step.id] === opt.val) classes += ' quiz-incorrect !opacity-100 scale-105';
                                else if (opt.val === step.correctAnswer) classes += ' border-emerald-400/50 text-emerald-400 !opacity-100'; 
                            }
                            return `
                                <button onclick="handleQuiz('${step.id}', ${opt.val}, this)" class="${classes} w-full py-4 rounded-xl flex items-center justify-center text-lg font-bold">
                                    ${opt[lang]}
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div id="quiz-feedback" class="mt-8 p-4 rounded-xl bg-slate-800/50 border border-white/10 text-center text-sm ${hasAnswered ? 'block' : 'hidden'} fade-in-up">
                        ${hasAnswered ? step.expl[lang] : ''}
                    </div>
                `;
            }

            // Type 7: END
            else if (step.type === 'end') {
                html = `
                    <div class="text-center space-y-6">
                        <h2 class="text-4xl md:text-5xl font-extrabold text-emerald-400">${step.title[lang]}</h2>
                        <p class="text-slate-300 text-lg">${step.desc[lang]}</p>
                        <button onclick="exportJSON()" class="mt-8 px-8 py-4 bg-white/10 border border-white/20 hover:bg-white/20 text-white font-bold rounded-2xl transition-all text-lg flex items-center justify-center gap-3 mx-auto">
                            ${step.btn[lang]}
                        </button>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // --- 4. LOGIQUE DES INPUTS & PSYCHOLOGIE UX ---

        function saveRadio(id, val, btnEl) {
            answers[id] = val;
            const parent = btnEl.parentElement;
            parent.querySelectorAll('button').forEach(b => {
                b.classList.remove('selected');
                b.classList.remove('scale-102');
            });
            btnEl.classList.add('selected');

            // Auto-advance pour la fluidité
            setTimeout(() => nextStep(), 400);
        }

        function toggleCheckbox(id, val, btnEl) {
            if (!answers[id]) answers[id] = [];
            const idx = answers[id].indexOf(val);
            
            if (val === 'aucun') { // Logique exclusive
                answers[id] = ['aucun'];
                btnEl.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                btnEl.classList.add('selected');
            } else {
                // Enlever 'aucun' si coché
                const aucunIdx = answers[id].indexOf('aucun');
                if (aucunIdx > -1) {
                    answers[id].splice(aucunIdx, 1);
                    // On retire la classe selected du dernier bouton (supposé être 'aucun')
                    const buttons = btnEl.parentElement.querySelectorAll('button');
                    buttons.forEach(b => { if(b.innerText.includes('Aucun') || b.innerText.includes('لا أخلطها')) b.classList.remove('selected'); });
                }
                
                if (idx > -1) {
                    answers[id].splice(idx, 1);
                    btnEl.classList.remove('selected');
                } else {
                    answers[id].push(val);
                    btnEl.classList.add('selected');
                }
            }
            updateNav();
        }

        function saveInput(id, val) {
            answers[id] = val;
            updateNav();
        }

        function handleQuiz(id, val, btnEl) {
            if (answers[id] !== undefined) return; // Déjà répondu
            answers[id] = val;
            
            const step = surveyData[currentStep];
            const isCorrect = val === step.correctAnswer;
            
            // Figer les autres boutons
            const container = document.getElementById('quiz-options');
            container.querySelectorAll('button').forEach(b => {
                b.classList.add('pointer-events-none', 'opacity-50');
            });

            btnEl.classList.remove('opacity-50', 'glass-btn');
            btnEl.classList.add('scale-105', '!opacity-100');
            
            if (isCorrect) {
                btnEl.classList.add('quiz-correct');
            } else {
                btnEl.classList.add('quiz-incorrect');
                // Surligner la bonne réponse
                container.querySelectorAll('button').forEach(b => {
                    if (b.innerText.trim() === step.options.find(o => o.val === step.correctAnswer)[lang]) {
                        b.classList.remove('opacity-50');
                        b.classList.add('border-emerald-400/50', 'text-emerald-400');
                    }
                });
            }

            // Afficher l'explication
            const feedback = document.getElementById('quiz-feedback');
            feedback.innerHTML = step.expl[lang];
            feedback.classList.remove('hidden');

            // Auto-advance retardé
            document.getElementById('next-btn').classList.remove('hidden');
            setTimeout(() => nextStep(), 3500);
        }

        // --- 5. NAVIGATION WIZARD ---

        function updateNav() {
            const step = surveyData[currentStep];
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            // Mise à jour Barre de progression
            const progress = ((currentStep) / (surveyData.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // Bouton Précédent
            if (currentStep > 0 && step.type !== 'end') {
                prevBtn.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                prevBtn.classList.add('opacity-0', 'pointer-events-none');
            }

            // Bouton Suivant (Géré par Auto-advance sauf pour certains types)
            if (step.type === 'intro' || step.type === 'end' || step.type === 'radio' || step.type === 'filter' || step.type === 'likert') {
                nextBtn.classList.add('hidden');
            } else if (step.type === 'quiz') {
                if (answers[step.id] !== undefined) nextBtn.classList.remove('hidden');
                else nextBtn.classList.add('hidden');
            } else {
                // Type Number ou Checkbox : L'utilisateur doit cliquer manuellement sur suivant
                if (step.type === 'checkbox' && answers[step.id] && answers[step.id].length > 0) nextBtn.classList.remove('hidden');
                else if (step.type === 'number' && answers[step.id] && answers[step.id].toString().trim() !== '') nextBtn.classList.remove('hidden');
                else nextBtn.classList.add('hidden');
            }
        }

        function nextStep() {
            let stepAmount = 1;
            
            // SKIP LOGIC : Si on a répondu "Non, jamais" au filtre, on saute les questions liées
            if (surveyData[currentStep].id === 'conso_ever' && answers['conso_ever'] === 0) {
                while(surveyData[currentStep + stepAmount] && surveyData[currentStep + stepAmount].condition === 'conso_ever') {
                    stepAmount++;
                }
            }

            if (currentStep + stepAmount < surveyData.length) {
                currentStep += stepAmount;
                renderStep();
            }
        }

        function prevStep() {
            let stepAmount = 1;
            
            // REVERSE SKIP LOGIC : Remonter correctement si on a passé les questions liées
            if (surveyData[currentStep - 1] && surveyData[currentStep - 1].condition === 'conso_ever' && answers['conso_ever'] === 0) {
                while(surveyData[currentStep - stepAmount] && surveyData[currentStep - stepAmount].condition === 'conso_ever') {
                    stepAmount++;
                }
            }

            if (currentStep - stepAmount >= 0) {
                currentStep -= stepAmount;
                renderStep();
            }
        }

        // --- 6. EXPORT DES DONNÉES ---
        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(answers, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "donnees_etudiants.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Lancement au chargement
        window.onload = () => renderStep();

    </script>
</body>
</html>
